name: Deploy React frontend to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Phase3 Project files/react-code/**'
      - '.github/workflows/deploy-react.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Phase3 Project files/react-code
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Phase3 Project files/react-code/package-lock.json'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          CI: false
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'Phase3 Project files/react-code/build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
